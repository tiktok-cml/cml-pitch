<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CML Admin — Pitch Forms</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #040404;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* Topbar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid #111;
  }
  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .topbar-logo {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.04em;
  }
  .topbar-logo span { color: #fe2858; }
  .topbar-sep { width: 1px; height: 20px; background: #1a1a1a; }
  .topbar-label {
    font-size: 13px;
    color: #444;
    font-weight: 400;
  }

  .new-btn {
    background: #fe2858;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px 28px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .new-btn:hover { background: #d91e45; }

  /* Auth gate */
  .auth-gate {
    max-width: 400px;
    margin: 80px auto;
    padding: 40px;
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-radius: 16px;
    text-align: center;
  }
  .auth-gate h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .auth-gate p { font-size: 13px; color: #555; margin-bottom: 24px; }
  .auth-gate input {
    width: 100%;
    background: #040404;
    border: 1px solid #1f1f1f;
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: #fff;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .auth-gate input:focus { border-color: #2af0ea; }
  .auth-gate input::placeholder { color: #333; }
  .auth-btn {
    width: 100%;
    background: #2af0ea;
    color: #040404;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .auth-btn:hover { opacity: 0.85; }
  .auth-error { color: #fe2858; font-size: 12px; margin-top: 8px; display: none; }

  /* Main layout */
  .main { padding: 32px; display: none; }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
  }
  .page-count { font-size: 13px; color: #444; margin-top: 2px; }

  /* Form cards grid */
  .forms-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .form-card {
    background: #0a0a0a;
    border: 1px solid #1a1a1a;
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s;
  }
  .form-card:hover { border-color: #222; }
  .form-card.inactive { opacity: 0.5; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    line-height: 1.3;
    max-width: 200px;
  }
  .status-pill {
    font-size: 10px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    flex-shrink: 0;
  }
  .status-pill.live { background: rgba(42,240,234,0.1); color: #2af0ea; }
  .status-pill.off  { background: #1a1a1a; color: #444; }

  .card-meta { font-size: 12px; color: #444; margin-bottom: 4px; }
  .card-meta span { color: #666; }

  .card-divider { height: 1px; background: #111; margin: 14px 0; }

  .link-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #040404;
    border: 1px solid #1a1a1a;
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 14px;
  }
  .link-text {
    font-size: 11px;
    color: #555;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-family: monospace;
  }
  .copy-btn {
    background: none;
    border: none;
    color: #2af0ea;
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .copy-btn:hover { color: #fff; }

  .card-actions {
    display: flex;
    gap: 8px;
  }
  .action-btn {
    flex: 1;
    background: none;
    border: 1px solid #1a1a1a;
    border-radius: 7px;
    padding: 7px 0;
    font-size: 11px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .action-btn.edit { color: #888; }
  .action-btn.edit:hover { background: #111; color: #fff; }
  .action-btn.toggle-live { color: #2af0ea; }
  .action-btn.toggle-live:hover { background: rgba(42,240,234,0.08); }
  .action-btn.toggle-off { color: #444; }
  .action-btn.toggle-off:hover { background: #111; color: #888; }
  .action-btn.del { color: #fe2858; }
  .action-btn.del:hover { background: rgba(254,40,88,0.08); }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
  }
  .empty-state p { font-size: 14px; color: #444; margin-bottom: 20px; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,4,4,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    display: none;
  }
  .modal {
    background: #0d0d0d;
    border: 1px solid #1f1f1f;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
    margin: 20px;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 24px;
  }
  .modal-field { margin-bottom: 16px; }
  .modal-field label {
    display: block;
    font-size: 12px;
    color: #666;
    font-weight: 500;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'Syne', sans-serif;
  }
  .modal-field label em { color: #fe2858; font-style: normal; }
  .modal-field input {
    width: 100%;
    background: #040404;
    border: 1px solid #1f1f1f;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal-field input:focus { border-color: #2af0ea; }
  .modal-field input::placeholder { color: #333; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .modal-save {
    flex: 1;
    background: #fe2858;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .modal-save:hover { background: #d91e45; }
  .modal-cancel {
    background: none;
    border: 1px solid #1f1f1f;
    border-radius: 8px;
    padding: 12px 20px;
    color: #555;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .modal-cancel:hover { background: #111; color: #fff; }
  .modal-error { color: #fe2858; font-size: 12px; margin-top: 8px; display: none; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: #ccc;
    z-index: 200;
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.teal { border-color: #2af0ea; color: #2af0ea; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid #1a1a1a;
    border-top-color: #2af0ea;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">TIKTOK <span>CML</span></div>
    <div class="topbar-sep"></div>
    <div class="topbar-label">Pitch Form Admin</div>
  </div>
  <button class="new-btn" id="new-form-btn" onclick="openCreateModal()" style="display:none;">+ New Form</button>
</div>

<!-- Auth Gate -->
<div id="auth-gate" class="auth-gate" style="display:none;">
  <h2>Admin Access</h2>
  <p>Enter the password to continue.</p>
  <input type="password" id="auth-password" placeholder="Password" onkeydown="if(event.key==='Enter') checkAuth()" />
  <button class="auth-btn" onclick="checkAuth()">Continue</button>
  <p class="auth-error" id="auth-error">Incorrect password.</p>
</div>

<!-- Main Dashboard -->
<div class="main" id="main">
  <div class="page-header">
    <div>
      <div class="page-title">Pitch Forms</div>
      <div class="page-count" id="form-count">Loading...</div>
    </div>
  </div>
  <div class="forms-grid" id="forms-grid">
    <div class="empty-state"><div class="spinner"></div><p style="color:#444;font-size:14px;margin-top:12px;">Loading forms...</p></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">New Pitch Form</div>
    <div class="modal-field">
      <label>Form Title<em>*</em></label>
      <input type="text" id="m-title" placeholder="e.g. Festival Szn Pitch Form" />
    </div>
    <div class="modal-field">
      <label>Playlist Name<em>*</em></label>
      <input type="text" id="m-playlist" placeholder="e.g. CML Festival Szn" />
    </div>
    <div class="modal-field">
      <label>Deadline (optional)</label>
      <input type="text" id="m-deadline" placeholder="e.g. April 15, 2026" />
    </div>
    <p class="modal-error" id="modal-error"></p>
    <div class="modal-actions">
      <button class="modal-save" id="modal-save-btn" onclick="saveForm()">Create Form</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── CONFIGURATION ────────────────────────────────────────
  const SCRIPT_URL  = "https://script.google.com/macros/s/AKfycbwMDe9iFpx_askbrr-7JDq5hpSaRt1X3ETAzPbfWgD1tuzgFQmg_PchvEdeljZcJZXS/exec";
  const BASE_URL    = "https://judettguy.github.io/cml-pitch/form/";
  const ADMIN_PASSWORD = "5L007leafOFtheWall";
  // ─────────────────────────────────────────────────────────

  let forms = [];
  let editingId = null;

  // ── Auth ─────────────────────────────────────────────────
  function checkAuth() {
    const input = document.getElementById("auth-password").value;
    if (input === ADMIN_PASSWORD) {
      localStorage.setItem("cml_admin_authed", "true");
      showDashboard();
    } else {
      document.getElementById("auth-error").style.display = "block";
    }
  }

  function showDashboard() {
    document.getElementById("auth-gate").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("new-form-btn").style.display = "block";
    loadForms();
  }

  window.addEventListener("DOMContentLoaded", () => {
    const authed = localStorage.getItem("cml_admin_authed");
    if (authed === "true") {
      showDashboard();
    } else {
      document.getElementById("auth-gate").style.display = "block";
    }
  });

  // ── Load forms ───────────────────────────────────────────
  async function loadForms() {
    try {
      const res = await fetch(`${SCRIPT_URL}?action=getForms`);
      const data = await res.json();
      forms = data.forms || [];
      renderForms();
    } catch(e) {
      toast("Failed to load forms", false);
    }
  }

  function renderForms() {
    const grid = document.getElementById("forms-grid");
    const count = document.getElementById("form-count");
    count.textContent = `${forms.length} form${forms.length !== 1 ? "s" : ""}`;

    if (!forms.length) {
      grid.innerHTML = `<div class="empty-state"><p>No forms yet — hit <strong style="color:#fff;">+ New Form</strong> in the top right to get started.</p></div>`;
      return;
    }

    grid.innerHTML = forms.map(f => {
      const link = `${BASE_URL}?id=${f.id}`;
      return `
        <div class="form-card ${f.active ? '' : 'inactive'}" id="card-${f.id}">
          <div class="card-top">
            <div class="card-title">${f.title}</div>
            <div class="status-pill ${f.active ? 'live' : 'off'}">${f.active ? 'Live' : 'Off'}</div>
          </div>
          <div class="card-meta">Playlist: <span>${f.playlist || '—'}</span></div>
          ${f.deadline ? `<div class="card-meta">Deadline: <span>${f.deadline}</span></div>` : ''}
          <div class="card-meta">Created: <span>${new Date(f.created).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'})}</span></div>
          <div class="card-divider"></div>
          <div class="link-row">
            <div class="link-text">${link}</div>
            <button class="copy-btn" onclick="copyLink('${link}', this)">Copy</button>
          </div>
          <div class="card-actions">
            <button class="action-btn edit" onclick="openEditModal('${f.id}')">Edit</button>
            <button class="action-btn ${f.active ? 'toggle-off' : 'toggle-live'}" onclick="toggleForm('${f.id}')">${f.active ? 'Pause' : 'Go Live'}</button>
            <button class="action-btn del" onclick="deleteForm('${f.id}')">Delete</button>
          </div>
        </div>`;
    }).join("");
  }

  // ── Copy link ────────────────────────────────────────────
  function copyLink(link, btn) {
    navigator.clipboard.writeText(link).then(() => {
      btn.textContent = "Copied!";
      setTimeout(() => btn.textContent = "Copy", 1800);
      toast("Link copied to clipboard", true);
    });
  }

  // ── Toggle ───────────────────────────────────────────────
  async function toggleForm(id) {
    try {
      const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "toggleForm", id }) });
      const data = await res.json();
      if (data.success) { toast(data.active ? "Form is now live" : "Form paused", true); loadForms(); }
    } catch(e) { toast("Failed to update form", false); }
  }

  // ── Delete ───────────────────────────────────────────────
  async function deleteForm(id) {
    if (!confirm("Delete this form? This cannot be undone.")) return;
    try {
      const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "deleteForm", id }) });
      const data = await res.json();
      if (data.success) { toast("Form deleted", false); loadForms(); }
    } catch(e) { toast("Failed to delete form", false); }
  }

  // ── Modal ────────────────────────────────────────────────
  function openCreateModal() {
    editingId = null;
    document.getElementById("modal-title").textContent = "New Pitch Form";
    document.getElementById("modal-save-btn").textContent = "Create Form";
    document.getElementById("m-title").value = "";
    document.getElementById("m-playlist").value = "";
    document.getElementById("m-deadline").value = "";
    document.getElementById("modal-error").style.display = "none";
    document.getElementById("modal-overlay").style.display = "flex";
  }

  function openEditModal(id) {
    const f = forms.find(f => f.id === id);
    if (!f) return;
    editingId = id;
    document.getElementById("modal-title").textContent = "Edit Form";
    document.getElementById("modal-save-btn").textContent = "Save Changes";
    document.getElementById("m-title").value = f.title;
    document.getElementById("m-playlist").value = f.playlist || "";
    document.getElementById("m-deadline").value = f.deadline || "";
    document.getElementById("modal-error").style.display = "none";
    document.getElementById("modal-overlay").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modal-overlay").style.display = "none";
  }

  document.getElementById("modal-overlay").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });

  async function saveForm() {
    const title    = document.getElementById("m-title").value.trim();
    const playlist = document.getElementById("m-playlist").value.trim();
    const deadline = document.getElementById("m-deadline").value.trim();
    const errEl    = document.getElementById("modal-error");

    if (!title || !playlist) {
      errEl.textContent = "Title and playlist name are required.";
      errEl.style.display = "block";
      return;
    }
    errEl.style.display = "none";

    const btn = document.getElementById("modal-save-btn");
    btn.disabled = true;
    btn.textContent = "Saving...";

    try {
      const action = editingId ? "updateForm" : "createForm";
      const body = editingId
        ? { action, id: editingId, title, playlist, deadline }
        : { action, title, playlist, deadline };

      const res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(body) });
      const data = await res.json();

      if (data.success) {
        closeModal();
        toast(editingId ? "Form updated" : "Form created", true);
        loadForms();
      } else {
        errEl.textContent = data.error || "Something went wrong.";
        errEl.style.display = "block";
      }
    } catch(e) {
      errEl.textContent = "Network error. Try again.";
      errEl.style.display = "block";
    }

    btn.disabled = false;
    btn.textContent = editingId ? "Save Changes" : "Create Form";
  }

  // ── Toast ────────────────────────────────────────────────
  function toast(msg, success = true) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "toast show" + (success ? " teal" : "");
    setTimeout(() => el.className = "toast", 3000);
  }
</script>
</body>
</html>
